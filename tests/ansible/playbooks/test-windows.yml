---
# Validate Windows-specific tools
# Replaces tests from goss-windows.yaml
# Total: 17 command tests + 3 file tests

- name: Validate Windows Jenkins Agent
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../../../provisioning/tools-versions.yml

  tasks:
    - name: Check Chocolatey (expects exit code 1)
      ansible.windows.win_shell: choco
      register: choco_check
      changed_when: false
      failed_when: choco_check.rc != 1
      ignore_errors: true

    - name: Validate Chocolatey exit code
      ansible.builtin.assert:
        that:
          - choco_check.rc == 1
        fail_msg: "Chocolatey should exit with code 1"
        success_msg: "Chocolatey exit code validated"

    - name: Check Docker version
      ansible.windows.win_shell: docker -v
      register: docker_version
      changed_when: false
      failed_when: docker_version.rc != 0

    - name: Check Docker Buildx version
      ansible.windows.win_shell: docker buildx version
      register: docker_buildx_version
      changed_when: false
      failed_when: docker_buildx_version.rc != 0

    - name: Check JDK 11 version
      ansible.windows.win_shell: C:\tools\jdk-11\bin\java --version
      register: jdk11_version_output
      changed_when: false
      failed_when: "jdk11_version not in jdk11_version_output.stdout"

    - name: Check JDK 17 version
      ansible.windows.win_shell: C:\tools\jdk-17\bin\java --version
      register: jdk17_version_output
      changed_when: false
      failed_when: "jdk17_version not in jdk17_version_output.stdout"

    - name: Check JDK 21 version
      ansible.windows.win_shell: C:\tools\jdk-21\bin\java --version
      register: jdk21_version_output
      changed_when: false
      failed_when: "jdk21_version not in jdk21_version_output.stdout"

    - name: Check JDK 25 version
      ansible.windows.win_shell: C:\tools\jdk-25\bin\java --version
      register: jdk25_version_output
      changed_when: false
      failed_when: "jdk25_version not in jdk25_version_output.stdout"

    - name: Check JDK 8 version (stderr output)
      ansible.windows.win_shell: C:\tools\jdk-8\bin\java -version
      register: jdk8_version_output
      changed_when: false
      failed_when: "jdk8_version not in jdk8_version_output.stderr"

    - name: Check Maven environment variable
      ansible.windows.win_shell: echo $env:MAVEN_HOME
      register: maven_home
      changed_when: false
      failed_when: "'C:\\tools\\apache-maven-' not in maven_home.stdout"

    - name: Check Maven with JDK 21 (environment variable)
      ansible.windows.win_shell: |
        $env:JAVA_HOME='C:\tools\jdk-21'
        mvn -v
      register: maven_version_output
      changed_when: false
      failed_when: "maven_version not in maven_version_output.stdout"

    - name: Check Node.js version (with negation check)
      ansible.windows.win_shell: node --version
      register: nodejs_version_output
      changed_when: false
      failed_when: >
        nodejs_windows_version not in nodejs_version_output.stdout or
        'Please install a version by running one of the following' in nodejs_version_output.stdout

    - name: Check nuget version
      ansible.windows.win_shell: nuget help
      register: nuget_version_output
      changed_when: false
      failed_when: "nuget_version not in nuget_version_output.stdout"

    - name: Check PowerShell version
      ansible.windows.win_shell: powershell -command "(Get-Host).Version"
      register: powershell_version
      changed_when: false
      failed_when: powershell_version.rc != 0

    - name: Check PowerShell Core (pwsh) version
      ansible.windows.win_shell: pwsh -command "(Get-Host).Version"
      register: pwsh_version_output
      changed_when: false
      failed_when: "pwsh_version_output.stdout is not regex(windows_pwsh_version | regex_replace('\\\\.', '.*'))"

    - name: Check Python version
      ansible.windows.win_shell: python --version
      register: python_version_output
      changed_when: false
      failed_when: "python3_version not in python_version_output.stdout"

    - name: Check Ruby version
      ansible.windows.win_shell: ruby -v
      register: ruby_version_output
      changed_when: false
      failed_when: "ruby_version not in ruby_version_output.stdout"

    - name: Check .NET Framework 3.5 registry key
      ansible.windows.win_reg_stat:
        path: HKLM:\SOFTWARE\Microsoft\NET Framework Setup\NDP\v3.5
      register: dotnet35_reg

    - name: Validate .NET Framework 3.5 is installed
      ansible.builtin.assert:
        that:
          - dotnet35_reg.exists
        fail_msg: ".NET Framework 3.5 is not installed"
        success_msg: ".NET Framework 3.5 validated"

    - name: Check Chromium installation directory
      ansible.windows.win_stat:
        path: 'C:\Program Files\Chromium\Application\'
      register: chromium_dir

    - name: Validate Chromium directory exists
      ansible.builtin.assert:
        that:
          - chromium_dir.stat.exists
          - chromium_dir.stat.isdir
        fail_msg: "Chromium not installed"
        success_msg: "Chromium installation validated"

    - name: Check Datadog agent directory
      ansible.windows.win_stat:
        path: 'C:\Program Files\Datadog\Datadog agent\bin\'
      register: datadog_dir

    - name: Validate Datadog agent directory exists
      ansible.builtin.assert:
        that:
          - datadog_dir.stat.exists
          - datadog_dir.stat.isdir
        fail_msg: "Datadog agent not installed"
        success_msg: "Datadog agent installation validated"

    - name: Check Datadog configuration file
      ansible.windows.win_stat:
        path: 'C:\ProgramData\Datadog\datadog.yaml'
      register: datadog_config

    - name: Validate Datadog configuration file exists
      ansible.builtin.assert:
        that:
          - datadog_config.stat.exists
          - not datadog_config.stat.isdir
        fail_msg: "Datadog configuration file not found"
        success_msg: "Datadog configuration validated"
