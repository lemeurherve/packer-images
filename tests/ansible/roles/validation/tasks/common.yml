---
# Common validation tasks for all platforms (Linux and Windows)
# Replaces tests from goss-common.yaml
# Total: 23 command tests

- name: Check AWS CLI version
  ansible.builtin.command: aws --version
  register: awscli_version
  changed_when: false
  async: 20
  poll: 1
  failed_when: "'2.34.43' not in awscli_version.stdout"

- name: Check Azure CLI version
  ansible.builtin.command: az --version
  register: azurecli_version
  changed_when: false
  async: 20
  poll: 1
  failed_when: "'2.86.0' not in azurecli_version.stdout"

- name: Check Bundle version
  ansible.builtin.command: bundle -v
  register: bundle_version
  changed_when: false
  failed_when: bundle_version.rc != 0

- name: Check container-structure-test version
  ansible.builtin.command: container-structure-test version
  register: cst_version
  changed_when: false
  failed_when: "'1.22.1' not in cst_version.stdout"

- name: Check Docker version
  ansible.builtin.command: docker -v
  register: docker_version
  changed_when: false
  failed_when: "'29.4.2' not in docker_version.stdout"

- name: Check Docker Buildx version
  ansible.builtin.command: docker buildx version
  register: docker_buildx_version
  changed_when: false
  failed_when: docker_buildx_version.rc != 0

- name: Verify no default Java in PATH (should fail)
  ansible.builtin.command: java --version
  register: java_check
  changed_when: false
  failed_when: java_check.rc == 0
  ignore_errors: true

- name: Validate Java is not in default path
  ansible.builtin.assert:
    that:
      - java_check.rc != 0
    fail_msg: "Java should not be in default PATH"
    success_msg: "Java correctly not in default PATH"

- name: Check Docker Compose version
  ansible.builtin.command: docker-compose -v
  register: docker_compose_version
  changed_when: false
  failed_when: "'5.1.3' not in docker_compose_version.stdout"

- name: Check GitHub CLI version
  ansible.builtin.command: gh --version
  register: gh_version
  changed_when: false
  failed_when: "'2.92.0' not in gh_version.stdout"

- name: Check Git LFS version
  ansible.builtin.command: git-lfs --version
  register: git_lfs_version
  changed_when: false
  failed_when: "'3.7.1' not in git_lfs_version.stdout"

- name: Check Hadolint version
  ansible.builtin.command: hadolint --version
  register: hadolint_version
  changed_when: false
  async: 60
  poll: 1
  failed_when: "'2.14.0' not in hadolint_version.stdout"

- name: Check jq version
  ansible.builtin.command: jq --version
  register: jq_version
  changed_when: false
  failed_when: "'jq-1.6' not in jq_version.stdout"

- name: Check jx-release-version
  ansible.builtin.command: jx-release-version -version
  register: jxreleaseversion_version
  changed_when: false
  failed_when: "'2.8.4' not in jxreleaseversion_version.stdout"

- name: Check kubectl version
  ansible.builtin.command: kubectl version --client
  register: kubectl_version
  changed_when: false
  failed_when: "'1.33.11' not in kubectl_version.stdout"

- name: Check Launchable version
  ansible.builtin.command: launchable --version
  register: launchable_version
  changed_when: false
  failed_when: "'1.123.2' not in launchable_version.stdout"

- name: Check Make version
  ansible.builtin.command: make --version
  register: make_version
  changed_when: false
  failed_when: make_version.rc != 0

- name: Check netlify-deploy
  ansible.builtin.command: netlify-deploy --help
  register: netlify_version
  changed_when: false
  failed_when: netlify_version.rc != 0

- name: Check npm version (with negation check)
  ansible.builtin.command: npm --version
  register: npm_version
  changed_when: false
  failed_when: "'No preset version installed for command npm' in npm_version.stdout or 'No preset version installed for command npm' in npm_version.stderr"

- name: Check Packer version
  ansible.builtin.command: packer -v
  register: packer_version
  changed_when: false
  async: 20
  poll: 1
  failed_when: "'1.15.3' not in packer_version.stdout"

- name: Check Terraform version
  ansible.builtin.command: terraform -v
  register: terraform_version
  changed_when: false
  async: 20
  poll: 1
  failed_when: "'1.12.2' not in terraform_version.stdout"

- name: Check Updatecli version
  ansible.builtin.command: updatecli version
  register: updatecli_version
  changed_when: false
  failed_when: "'0.116.3' not in updatecli_version.stdout"

- name: Check yq version
  ansible.builtin.command: yq --version
  register: yq_version
  changed_when: false
  failed_when: "'4.53.2' not in yq_version.stdout"
