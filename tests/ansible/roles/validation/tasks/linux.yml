---
# Linux-specific validation tasks
# Replaces tests from goss-linux.yaml
# Total: 32 command tests + 1 file test

- name: Check asdf version
  ansible.builtin.command: asdf version
  register: asdf_version
  changed_when: false
  failed_when: "'v0.15.0' not in asdf_version.stdout"

- name: Check azcopy version
  ansible.builtin.command: azcopy --version
  register: azcopy_version
  changed_when: false
  failed_when: "'10.32.3' not in azcopy_version.stdout"

- name: Check chromium-browser version
  ansible.builtin.command: chromium-browser --version
  register: chromium_version
  changed_when: false
  failed_when: chromium_version.rc != 0

- name: Check datadog-agent version
  ansible.builtin.command: datadog-agent version
  register: datadog_version
  changed_when: false
  failed_when: datadog_version.rc != 0

- name: Check doctl version
  ansible.builtin.command: doctl version
  register: doctl_version
  changed_when: false
  failed_when: "'1.157.0' not in doctl_version.stdout"

- name: Check git version
  ansible.builtin.command: git --version
  register: git_version
  changed_when: false
  failed_when: "'2.54.0' not in git_version.stdout"

- name: Check Go version
  ansible.builtin.command: go version
  register: go_version
  changed_when: false
  failed_when: "'1.26.2' not in go_version.stdout"

- name: Check golangci-lint version
  ansible.builtin.command: golangci-lint --version
  register: golangcilint_version
  changed_when: false
  failed_when: "'2.12.1' not in golangcilint_version.stdout"

- name: Check Helm version
  ansible.builtin.command: helm version
  register: helm_version
  changed_when: false
  failed_when: "'3.19.1' not in helm_version.stdout"

- name: Check Helmfile version
  ansible.builtin.command: helmfile --version
  register: helmfile_version
  changed_when: false
  failed_when: "'1.5.0' not in helmfile_version.stdout"

- name: Check Helm plugins (regex pattern matching)
  ansible.builtin.command: helm plugin list
  register: helm_plugins
  changed_when: false
  failed_when: >
    helm_plugins.stdout is not regex('diff.*3.15.6') or
    helm_plugins.stdout is not regex('helm-git.*1.5.2') or
    helm_plugins.stdout is not regex('secrets.*4.7.6')

- name: Check JDK 11 version
  ansible.builtin.command: /opt/jdk-11/bin/java --version
  register: jdk11_version
  changed_when: false
  failed_when: "'11.0.31+11' not in jdk11_version.stdout"

- name: Check JDK 17 version
  ansible.builtin.command: /opt/jdk-17/bin/java --version
  register: jdk17_version
  changed_when: false
  failed_when: "'17.0.19+10' not in jdk17_version.stdout"

- name: Check JDK 21 version
  ansible.builtin.command: /opt/jdk-21/bin/java --version
  register: jdk21_version
  changed_when: false
  failed_when: "'21.0.11+10' not in jdk21_version.stdout"

- name: Check JDK 25 version
  ansible.builtin.command: /opt/jdk-25/bin/java --version
  register: jdk25_version
  changed_when: false
  failed_when: "'25.0.3+9' not in jdk25_version.stdout"

- name: Check JDK 8 version (stderr output)
  ansible.builtin.command: /opt/jdk-8/bin/java -version
  register: jdk8_version
  changed_when: false
  failed_when: "'1.8.0_482' not in jdk8_version.stderr"

- name: Check Maven with JDK 21 (environment variable)
  ansible.builtin.command: mvn -v
  environment:
    JAVA_HOME: /opt/jdk-21
  register: maven_version
  changed_when: false
  failed_when: "'3.9.15' not in maven_version.stdout"

- name: Check Node.js version (with negation check)
  ansible.builtin.command: node --version
  register: nodejs_version
  changed_when: false
  failed_when: >
    '24.15.0' not in nodejs_version.stdout or
    'Please install a version by running one of the following' in nodejs_version.stdout

- name: Check Parallel version
  ansible.builtin.command: parallel --version
  register: parallel_version
  changed_when: false
  failed_when: parallel_version.rc != 0

- name: Check Playwright version
  ansible.builtin.command: playwright --version
  register: playwright_version
  changed_when: false
  failed_when: "'1.59.1' not in playwright_version.stdout"

- name: Check Python3 version
  ansible.builtin.command: python3 --version
  register: python3_version
  changed_when: false
  failed_when: python3_version.rc != 0

- name: Check rsync version
  ansible.builtin.command: rsync --version
  register: rsync_version
  changed_when: false
  failed_when: rsync_version.rc != 0

- name: Check Ruby versions via asdf
  ansible.builtin.command: asdf list ruby
  register: ruby_versions
  changed_when: false
  failed_when: >
    '2.6.10' not in ruby_versions.stdout or
    '3.4.8' not in ruby_versions.stdout

- name: Check rngd version
  ansible.builtin.command: rngd --version
  register: rngd_version
  changed_when: false
  failed_when: rngd_version.rc != 0

- name: Check SOPS version
  ansible.builtin.command: sops --version
  register: sops_version
  changed_when: false
  failed_when: "'3.12.2' not in sops_version.stdout"

- name: Check SSH agent command
  ansible.builtin.command: which ssh-agent
  register: ssh_agent_check
  changed_when: false
  failed_when: ssh_agent_check.rc != 0

- name: Check typos version
  ansible.builtin.command: typos --version
  register: typos_version
  changed_when: false
  failed_when: "'1.33.1' not in typos_version.stdout"

- name: Check unzip version
  ansible.builtin.command: unzip -v
  register: unzip_version
  changed_when: false
  failed_when: unzip_version.rc != 0

- name: Check xq version
  ansible.builtin.command: xq --version
  register: xq_version
  changed_when: false
  failed_when: "'1.2.3' not in xq_version.stdout"

- name: Check yamllint version
  ansible.builtin.command: yamllint -v
  register: yamllint_version
  changed_when: false
  failed_when: yamllint_version.rc != 0

- name: Check zip version
  ansible.builtin.command: zip -v
  register: zip_version
  changed_when: false
  failed_when: zip_version.rc != 0

- name: Check /home/jenkins directory
  ansible.builtin.stat:
    path: /home/jenkins
  register: jenkins_home

- name: Validate jenkins home directory properties
  ansible.builtin.assert:
    that:
      - jenkins_home.stat.exists
      - jenkins_home.stat.isdir
      - jenkins_home.stat.mode == '0750'
      - jenkins_home.stat.pw_name == 'jenkins'
      - jenkins_home.stat.gr_name == 'jenkins'
    fail_msg: "Jenkins home directory validation failed"
    success_msg: "Jenkins home directory validated successfully"
