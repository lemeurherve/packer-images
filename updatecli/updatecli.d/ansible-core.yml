---
name: Bump Ansible Core version

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      branch: "{{ .github.branch }}"

sources:
  lastReleaseVersion:
    kind: pypi
    name: Get the latest Ansible Core version
    spec:
      package: ansible-core
    transformers:
      - trimprefix: v

targets:
  updateToolVersion:
    name: Update the `Ansible Core` tool version
    kind: yaml
    spec:
      file: provisioning/tools-versions.yml
      key: $.ansible_core_version
    scmid: default

actions:
  default:
    kind: github/pullrequest
    title: Bump Ansible Core version to {{ source "lastReleaseVersion" }}
    scmid: default
    spec:
      labels:
        - enhancement
        - ansible
